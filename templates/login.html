<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 校园心理咨询室预约系统</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); width: 420px; max-width: 92vw; }
.login-card h2 { color: #2d3748; font-weight: 700; margin-bottom: 8px; }
.login-card .sub { color: #718096; margin-bottom: 28px; }
.form-label { font-weight: 600; color: #4a5568; font-size: 14px; }
.form-control { padding: 12px 14px; border-radius: 10px; border: 1.5px solid #e2e8f0; }
.form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.15); }
.btn-login { background: linear-gradient(135deg, #667eea, #764ba2); border: 0; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 15px; }
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(102,126,234,0.4); }
.tips { margin-top: 20px; padding: 14px; background: #f7fafc; border-radius: 10px; font-size: 12px; color: #718096; line-height: 1.7; }
.tips code { background: #edf2f7; padding: 2px 6px; border-radius: 4px; color: #2d3748; font-size: 11px; }
.icon-header { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="login-card">
<div class="icon-header"><i class="bi bi-heart-pulse"></i></div>
<h2>心理咨询室管理平台</h2>
<p class="sub">Campus Counseling Center</p>
{% if message %}
<div class="alert alert-warning alert-dismissible fade show" role="alert"><i class="bi bi-exclamation-triangle me-1"></i>{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
{% endif %}
<form method="post" action="/login/submit">
<div class="mb-3"><label class="form-label">用户名</label>
<div class="input-group"><span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
<input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus></div></div>
<div class="mb-4"><label class="form-label">密码</label>
<div class="input-group"><span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
<input type="password" name="password" class="form-control" placeholder="请输入密码" required></div></div>
<button type="submit" class="btn btn-primary w-100 btn-login">登 录 <i class="bi bi-arrow-right ms-1"></i></button>
</form>
<div class="tips">
<div><i class="bi bi-link-45deg me-1"></i>匿名预约入口：<a href="/anonymous/book" target="_blank">/anonymous/book</a></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
